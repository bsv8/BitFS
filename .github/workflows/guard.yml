name: guard

on:
  pull_request:
  push:

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'

      - name: Resolve guard-private
        env:
          GUARD_REPO_URL: ${{ vars.GUARD_REPO_URL }}
        run: |
          if [ -d "/home/david/Workspaces/guard-private" ]; then
            echo "GUARD_ROOT=/home/david/Workspaces/guard-private" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -n "${GUARD_REPO_URL:-}" ]; then
            git clone "$GUARD_REPO_URL" "$RUNNER_TEMP/guard-private"
            echo "GUARD_ROOT=$RUNNER_TEMP/guard-private" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "guard-private not found, set org variable GUARD_REPO_URL" >&2
          exit 1

      - name: Run guard (PR)
        if: github.event_name == 'pull_request'
        run: |
          ./.guard/run-guard.sh range "${{ github.event.pull_request.base.sha }}..${{ github.sha }}"

      - name: Run guard (push)
        if: github.event_name == 'push'
        run: |
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            base="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          else
            base="${{ github.event.before }}"
          fi
          ./.guard/run-guard.sh range "$base..${{ github.sha }}"
