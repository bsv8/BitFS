[keys]
# raw 32-byte secp256k1 private key hex only
privkey_hex = "REPLACE_32BYTE_SECP256K1_PRIVKEY_HEX"

[seller]
enabled = true

[seller.pricing]
floor_price_sat_per_64k = 10
resale_discount_bps = 8000
live_base_price_sat_per_64k = 40
live_floor_price_sat_per_64k = 10
live_decay_per_minute_bps = 1000

[live]
cache_max_bytes = 0

[live.buyer]
target_lag_segments = 3
max_budget_per_minute = 0
prefer_older_segments = true

[live.publish]
broadcast_window = 10
broadcast_interval_seconds = 3
